services:
  mysql:
    image: mysql:8.4
    container_name: skill-store-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skill_store
      MYSQL_USER: skill_store
      MYSQL_PASSWORD: skill_store
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: ["mysqld", "--mysql-native-password=ON"]

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: skill-store-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  mysql-data:
