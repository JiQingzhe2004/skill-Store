services:
  mysql:
    image: mysql:8.4
    container_name: skill-store-mysql-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: skill_store
      MYSQL_USER: skill_store
      MYSQL_PASSWORD: skill_store
    ports:
      - "3306:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    command: ["mysqld", "--mysql-native-password=ON"]
    networks:
      - skill-store-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "skill_store", "-pskill_store"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: skill-store-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - skill-store-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: skill-store-api-dev
    restart: unless-stopped
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: mysql://skill_store:skill_store@mysql:3306/skill_store
      SHADOW_DATABASE_URL: mysql://skill_store:skill_store@mysql:3306/skill_store_shadow
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      NODE_ENV: development
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - skill-store-network
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./apps/api/prisma:/app/apps/api/prisma
      - ./packages/shared:/app/packages/shared
      # only protect app-level node_modules
      - /app/apps/api/node_modules

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: skill-store-web-dev
    restart: unless-stopped
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
      API_BASE_URL: http://api:3001
      WATCHPACK_POLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - skill-store-network
    volumes:
      - ./apps/web/app:/app/apps/web/app
      - ./apps/web/components:/app/apps/web/components
      - ./apps/web/lib:/app/apps/web/lib
      - ./apps/web/messages:/app/apps/web/messages
      - ./apps/web/public:/app/apps/web/public
      - ./packages/shared:/app/packages/shared
      # only protect app-level node_modules, not root (root has tiptap etc)
      - /app/apps/web/node_modules
      - /app/apps/web/.next

volumes:
  mysql_data_dev:

networks:
  skill-store-network:
    driver: bridge
